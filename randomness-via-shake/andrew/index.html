<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <title>andrew</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/addons/p5.sound.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        overflow: hidden;
        background: #000;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        height: 100%;
        width: 100%;
        -webkit-user-select: none;
        user-select: none;
      }
      canvas { display: block; }

      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #000;
        z-index: 10;
        padding: 24px;
        text-align: center;
        transition: opacity 0.4s ease;
      }
      #overlay.hidden { opacity: 0; pointer-events: none; }

      .screen { display: none; flex-direction: column; align-items: center; gap: 14px; }
      .screen.active { display: flex; }

      button {
        font: inherit;
        font-size: 17px;
        letter-spacing: 0.02em;
        padding: 16px 28px;
        background: #fff;
        color: #000;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      button:active { transform: scale(0.97); }
      .hint { font-size: 13px; opacity: 0.55; letter-spacing: 0.02em; }
      .err  { font-size: 13px; opacity: 0.7; color: #ddd; margin-top: 4px; min-height: 1em; }
    </style>
  </head>
  <body>
    <div id="overlay">
      <div id="screen-motion" class="screen active">
        <button id="motion-btn">enable motion</button>
        <div class="err" id="motion-err"></div>
      </div>
      <div id="screen-start" class="screen">
        <button id="start-btn">tap to start experience</button>
        <div class="hint">(shake phone for a different song)</div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
